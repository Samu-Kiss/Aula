name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Supabase — use placeholder values so Next.js can complete the build
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
          # JWT
          STUDENT_JWT_SECRET: ${{ secrets.STUDENT_JWT_SECRET || 'ci-placeholder-secret-32-chars-min' }}
          STUDENT_JWT_ISSUER: aula
          STUDENT_JWT_TTL_DEFAULT: '86400'
          STUDENT_JWT_TTL_REMEMBER: '2592000'
          # Resend
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}
          EMAIL_FROM: 'Aula <hola@aula.com>'
          # Sentry — disabled in CI builds
          NEXT_PUBLIC_SENTRY_ENABLED: 'false'
          SENTRY_DSN: ''
          # App
          NEXT_PUBLIC_APP_URL: https://aula.example.com
          NEXT_PUBLIC_DEFAULT_TIMEZONE: America/Bogota
